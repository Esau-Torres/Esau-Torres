name: Generate pacman animation

on:
  schedule: # Ejecuta cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. Clonar el repositorio es buena práctica para asegurar el entorno
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Generar el SVG en la raíz del proyecto
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # 3. Crear la carpeta 'dist' y mover el archivo generado ahí
      - name: Prepare artifact directory
        run: |
          mkdir -p dist
          mv pacman-contribution-graph.svg dist/

      # 4. Subir la carpeta 'dist' (Actualizado a v4 para evitar warnings de Node)
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    name: Update Profile README
    steps:
      - uses: actions/checkout@v4
      
      - uses: Readme-Workflows/recent-activity@v2.4.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
